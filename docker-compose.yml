services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trietlylagi
      POSTGRES_USER: triet
      POSTGRES_PASSWORD: triet
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triet -d trietlylagi"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://triet:triet@db:5432/trietlylagi
      FRONTEND_ORIGIN: "http://localhost:5174"
      SECRET_KEY: local-dev-secret-change-me
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed.seed_data &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5174:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    command: >
      sh -c "npm install && npm run dev"
    depends_on:
      - backend

volumes:
  postgres-data:
